<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> .hidden { display: none !important; } </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <nav class="bg-gray-900 text-white p-4 shadow-md flex justify-between items-center">
        <div class="font-bold text-xl">Instructor Portal</div>
        <div class="flex space-x-4">
            <button onclick="showTab('tests')" class="hover:text-blue-400 font-medium">Manage Tests</button>
            <button onclick="showTab('users')" class="hover:text-blue-400 font-medium">Student Analytics</button>
            <button onclick="logout()" class="ml-4 bg-red-600 px-3 py-1 rounded text-sm hover:bg-red-700">Logout</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-6 mt-6">
        
        <!-- TESTS TAB -->
        <div id="tests-tab" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Create New Test</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-1 text-gray-700">Test Name</label>
                        <input type="text" id="test-title" placeholder="e.g. NEET 2026 Set 1" class="w-full p-3 border rounded bg-gray-50">
                    </div>
                    <div>
                        <label class="block font-bold mb-1 text-gray-700">Upload JSON File</label>
                        <input type="file" id="file-upload" accept=".json" class="w-full p-2 border rounded bg-gray-50">
                    </div>
                </div>
                <button onclick="uploadTest()" class="mt-4 bg-blue-600 text-white font-bold px-6 py-2 rounded shadow hover:bg-blue-700">Upload Test</button>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Manage Existing Tests</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 border-b">
                                <th class="p-3">Test Name</th>
                                <th class="p-3">Created On</th>
                                <th class="p-3">Test ID</th>
                                <th class="p-3 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-tests-table"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- USERS/ANALYTICS TAB -->
        <div id="users-tab" class="hidden space-y-6">
            
            <!-- CREATE STUDENT ACCOUNT -->
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-purple-500">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Create Student Account</h2>
                <div class="flex space-x-4">
                    <input type="text" id="new-user-name" placeholder="Student Username" class="flex-1 p-3 border rounded bg-gray-50 focus:ring-2 focus:ring-purple-400">
                    <input type="password" id="new-user-pass" placeholder="Password" class="flex-1 p-3 border rounded bg-gray-50 focus:ring-2 focus:ring-purple-400">
                    <button onclick="createStudent()" class="bg-purple-600 text-white font-bold px-6 py-2 rounded shadow hover:bg-purple-700">Create</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Student Profiles</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <div class="col-span-1 border-r pr-4">
                        <h3 class="font-bold text-gray-600 mb-2">Registered Students</h3>
                        <div id="admin-users-list" class="space-y-2 max-h-96 overflow-y-auto"></div>
                    </div>

                    <div class="col-span-2 pl-2">
                        <h3 id="selected-user-name" class="font-bold text-xl text-gray-800 mb-2">Select a student</h3>
                        <div id="user-stats" class="hidden">
                            <p class="text-gray-600 mb-4">Total Tests Taken: <span id="stat-count" class="font-bold text-gray-900"></span> | Avg Score: <span id="stat-avg" class="font-bold text-green-600"></span>%</p>
                            <canvas id="adminUserChart" height="150"></canvas>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script>
        let adminData = { tests: [], users: [] };
        let adminChart = null;

        async function initAdmin() {
            const res = await fetch('/api/auth/status');
            const data = await res.json();
            if (!data.logged_in || !data.is_admin) {
                window.location.href = '/';
                return;
            }
            loadAdminData();
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/';
        }

        function showTab(tab) {
            document.getElementById('tests-tab').classList.add('hidden');
            document.getElementById('users-tab').classList.add('hidden');
            document.getElementById(`${tab}-tab`).classList.remove('hidden');
        }

        async function loadAdminData() {
            const res = await fetch('/api/admin/data');
            adminData = await res.json();
            renderTestsTable();
            renderUsersList();
        }

        function renderTestsTable() {
            const tbody = document.getElementById('admin-tests-table');
            tbody.innerHTML = '';
            adminData.tests.forEach(t => {
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 font-bold">${t.title}</td>
                        <td class="p-3 text-sm text-gray-600">${t.created_at}</td>
                        <td class="p-3 text-sm font-mono">${t.id}</td>
                        <td class="p-3 text-right">
                            <button onclick="deleteTest('${t.id}')" class="text-red-500 hover:text-red-700 font-bold text-sm bg-red-50 px-3 py-1 rounded">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderUsersList() {
            const list = document.getElementById('admin-users-list');
            list.innerHTML = '';
            adminData.users.forEach(u => {
                list.innerHTML += `
                    <button onclick="viewUser(${u.id})" class="w-full text-left p-3 border rounded-lg hover:bg-green-50 hover:border-green-300 transition mb-2 focus:ring-2 focus:ring-green-400">
                        <span class="font-bold text-gray-800">${u.username}</span>
                        <span class="text-xs text-gray-500 block">Tests: ${u.history.length}</span>
                    </button>
                `;
            });
        }

        function viewUser(userId) {
            const user = adminData.users.find(u => u.id === userId);
            if(!user) return;

            document.getElementById('selected-user-name').innerText = `Analytics for ${user.username}`;
            document.getElementById('user-stats').classList.remove('hidden');
            
            document.getElementById('stat-count').innerText = user.history.length;
            const avg = user.history.length ? (user.history.reduce((a,b) => a + b.percentage, 0) / user.history.length).toFixed(1) : 0;
            document.getElementById('stat-avg').innerText = avg;

            const ctx = document.getElementById('adminUserChart').getContext('2d');
            if(adminChart) adminChart.destroy();
            adminChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: user.history.map(h => h.date.split(' ')[0]),
                    datasets: [{
                        label: 'Score Percentage', data: user.history.map(h => h.percentage),
                        borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        borderWidth: 2, fill: true, tension: 0.3
                    }]
                },
                options: { scales: { y: { beginAtZero: true, max: 100 } } }
            });
        }

        async function createStudent() {
            const u = document.getElementById('new-user-name').value;
            const p = document.getElementById('new-user-pass').value;
            if(!u || !p) { alert("Please provide both username and password"); return; }

            const res = await fetch('/api/admin/users', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            
            if (res.ok) {
                alert("Student account created!");
                document.getElementById('new-user-name').value = '';
                document.getElementById('new-user-pass').value = '';
                loadAdminData();
            } else { alert("Error: " + data.error); }
        }

        async function uploadTest() {
            const title = document.getElementById('test-title').value;
            const fileInput = document.getElementById('file-upload');
            
            if (!title || fileInput.files.length === 0) {
                alert("Please provide both a Test Name and a JSON file.");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const questions = JSON.parse(e.target.result);
                    const res = await fetch('/api/admin/tests', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: title, questions: questions })
                    });
                    if (res.ok) {
                        alert("Test created successfully!");
                        document.getElementById('test-title').value = '';
                        fileInput.value = '';
                        loadAdminData();
                    } else {
                        try {
                            const err = await res.json();
                            alert("Error: " + err.error);
                        } catch(e) { alert("Server error. Check flask terminal."); }
                    }
                } catch (e) { alert("Invalid JSON file formatting."); }
            };
            reader.readAsText(file);
        }

        async function deleteTest(id) {
            if(!confirm("Are you sure you want to delete this test?")) return;
            const res = await fetch(`/api/admin/tests/${id}`, { method: 'DELETE' });
            if(res.ok) loadAdminData();
        }

        initAdmin();
    </script>
</body>
</html>
