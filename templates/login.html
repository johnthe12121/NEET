<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NEET Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen font-sans text-gray-800 flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-indigo-600 mb-2 text-center">Welcome Back!</h1>
        <p class="text-center text-gray-500 mb-6 font-medium">Log in to continue your NEET prep.</p>
        
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none">
            
            <div class="flex space-x-4 pt-4">
                <button onclick="login()" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-lg shadow hover:bg-indigo-700 transition">Log In</button>
                <button onclick="register()" class="flex-1 bg-green-500 text-white font-bold py-3 rounded-lg shadow hover:bg-green-600 transition">Register</button>
            </div>
            
            <p id="auth-error" class="text-red-500 text-center text-sm font-bold mt-3 hidden"></p>
        </div>
    </div>

    <script>
        async function login() {
            const btn = document.querySelector('button');
            btn.innerText = "Loading...";
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({username: document.getElementById('username').value, password: document.getElementById('password').value})
                });
                const data = await res.json();
                if (res.ok) {
                    if (data.is_admin) window.location.href = '/admin';
                    else window.location.href = '/';
                } else {
                    document.getElementById('auth-error').innerText = data.error;
                    document.getElementById('auth-error').classList.remove('hidden');
                    btn.innerText = "Log In";
                }
            } catch (e) {
                document.getElementById('auth-error').innerText = "Server communication error.";
                document.getElementById('auth-error').classList.remove('hidden');
                btn.innerText = "Log In";
            }
        }

        async function register() {
            const btn = document.querySelectorAll('button')[1];
            btn.innerText = "Loading...";
            const res = await fetch('/api/auth/register', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({username: document.getElementById('username').value, password: document.getElementById('password').value})
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                alert("Registration failed. Username might be taken.");
                btn.innerText = "Register";
            }
        }
    </script>
</body>
</html>
